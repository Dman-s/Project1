version: "3.8"
services:
# ── PostgreSQL + Pgvector ──────────────────────────
 postgres:
  image: pgvector/pgvector:pg15
  container_name: L_postgres
  restart: unless-stopped
  environment:
    POSTGRES_DB: L_agent
    POSTGRES_USER: Ladmin
    POSTGRES_PASSWORD: Ladmin
  ports:
    - "5432:5432"
  volumes:
    - postgres_data:/var/lib/postgresql/data
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U Ladmin -d L_agent"]
    interval: 5s
    timeout: 5s
    retries: 5
# ── Redis ──────────────────────────────────────────
 redis:
  image: redis:7-alpine
  container_name: L_agent_redis
  restart: unless-stopped
  ports:
    - "6379:6379"
  volumes:
    - redis_data:/data
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 5s
    timeout: 5s
    retries: 5
# ── MinIO 对象存储 ─────────────────────────────────
 minio:
  image: minio/minio:RELEASE.2025-02-28T09-55-16Z
  container_name: L_agent_minio
  restart: unless-stopped
  environment:
    MINIO_ROOT_USER: minioadmin
    MINIO_ROOT_PASSWORD: minioadmin
  ports:
    - "9000:9000" # API 端⼝
    - "9001:9001" # Console 端⼝
  volumes:
    - minio_data:/data
  command: server /data --console-address ":9001"
  healthcheck:
    test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
    interval: 10s
    timeout: 5s
    retries: 3
networks:
 default:
  name: L_network
volumes:
 postgres_data:
 redis_data:
 minio_data:
